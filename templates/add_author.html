<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Autor hinzufügen</title></head>
  <body>
    <h1>Autor hinzufügen</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul>
          {% for category, msg in messages %}
            <li><strong>{{ category }}:</strong> {{ msg }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div>
        <label>Name *</label><br>
        <input type="text" name="name" required>
      </div>

      <div>
        <label>Geburtsdatum (YYYY-MM-DD)</label><br>
        <input type="text" name="birth_date" placeholder="z.B. 1815-12-10">
      </div>

      <div>
        <label>Sterbedatum (YYYY-MM-DD)</label><br>
        <input type="text" name="date_of_death" placeholder="z.B. 1852-11-27">
      </div>

      <button type="submit">Speichern</button>
    </form>

    <p><a href="{{ url_for('home') }}">Zur Startseite</a></p>
  </body>
</html>
