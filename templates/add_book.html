<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Buch hinzufügen</title></head>
  <body>
    <h1>Buch hinzufügen</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul>
          {% for category, msg in messages %}
            <li><strong>{{ category }}:</strong> {{ msg }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div>
        <label>ISBN *</label><br>
        <input type="text" name="isbn" required>
      </div>

      <div>
        <label>Titel *</label><br>
        <input type="text" name="title" required>
      </div>

      <div>
        <label>Erscheinungsjahr</label><br>
        <input type="number" name="publication_year" min="0" max="3000">
      </div>

      <div>
        <label>Autor *</label><br>
        <select name="author_id" required>
          <option value="" disabled selected>Bitte wählen…</option>
          {% for author in authors %}
            <option value="{{ author.id }}">{{ author.name }}</option>
          {% endfor %}
        </select>
      </div>

      <button type="submit">Speichern</button>
    </form>

    <p><a href="{{ url_for('home') }}">Zur Startseite</a></p>
  </body>
</html>
